schema_version: 1

context:
  version: "314.0.0"
  python_min: "3.14"

package:
  name: pyodide-py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyodide-py/pyodide_py-${{ version }}.tar.gz
  sha256: 4aed346c7df4a863539fd97a27bc5c08730f1c93acdb9dd42b7bc218cad9c1e3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.2
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pyodide
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: A Python package providing core interpreter functionality for Pyodide
  license: MPL-2.0
  license_file: LICENSE
  homepage: https://github.com/pyodide/pyodide
  documentation: https://pyodide.org/en/stable/

extra:
  recipe-maintainers:
    - rxm7706
    - yuvipanda
